<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pud's Pit Instagram Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />

  <header class="topbar">

  <script src="content.js"></script>
  <script src="script.js"></script>

</html>
