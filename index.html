<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pud's Pit Instagram Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=DM+Sans:wght@400;500;700&family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <div class="weekpill" id="weekpill">WEEK OF —</div>
      <p class="topbar__tag" id="tagline"></p>
      <div class="topbar__actions">
        <button type="button" class="btn-topbar" id="btn-reset" title="Discard all edits and reload from content.js">RESET</button>
        <button type="button" class="btn-topbar btn-topbar--primary" id="btn-save">SAVE WEEK ↓</button>
      </div>
    </div>
  </header>

  <!-- Save Week modal -->
  <div class="modal" id="save-modal" hidden>
    <div class="modal__backdrop" data-close></div>
    <div class="modal__panel" role="dialog" aria-labelledby="save-title" aria-modal="true">
      <div class="modal__head">
        <h2 id="save-title">Save this week</h2>
        <button type="button" class="modal__close" data-close aria-label="Close">×</button>
      </div>
      <p class="modal__intro">
        Copy this block, then replace the matching section of <code>content.js</code> in your repo. Commit + push to lock it in. Or just keep editing in the dashboard — your changes are auto-saved to this browser.
      </p>
      <textarea class="modal__textarea" id="save-output" spellcheck="false" readonly></textarea>
      <div class="modal__actions">
        <button type="button" class="btn-topbar" id="btn-copy">COPY TO CLIPBOARD</button>
        <button type="button" class="btn-topbar" id="btn-download-js">DOWNLOAD content.js</button>
      </div>
    </div>
  </div>

  <main class="layout">
    <nav class="sidebar" id="sidebar" aria-label="Dashboard sections"></nav>
    <section class="content" id="content"></section>
  </main>

  <script src="content.js"></script>
  <script src="script.js"></script>
</body>
</html>
